name: Build & Release APK (Huawei AppGallery Ready)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-champion-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK (unsigned for AppGallery)
        working-directory: android
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Upload Release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quiz-champion-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          name: "بطل الأسئلة ${{ github.ref_name }}"
          body: |
            🏆 بطل الأسئلة - تحديث جديد!

            📱 جاهز للرفع على متجر هواوي AppGallery

            **ملفات التحميل:**
            - `app-debug.apk` - نسخة تصحيح
            - `app-release.apk` - نسخة الإنتاج (موقعة)

            **دعم Huawei IAP:** ✅
            - باقات استهلاكية (عملات + جواهر)
            - إزالة الإعلانات (غير استهلاكية)
            - عضوية VIP (اشتراك)

            **متطلبات الرفع على AppGallery:**
            1. رفع ملف `app-release.apk` الموقع
            2. إعداد المنتجات IAP في AppGallery Connect
            3. رفع لقطات الشاشة والوصف
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
